<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>剪貼簿 v3</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #222;
    }

    .hidden {
      display: none !important;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
    }

    .panel, .card {
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      margin-bottom: 14px;
    }

    textarea, input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d0d0d7;
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
    }

    textarea {
      min-height: 96px;
      resize: none;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
      align-items: flex-start;
    }

    .row > * {
      flex: 1;
      min-width: 140px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
      background: #dbe2ea;
      color: #1f2937;
    }

    button.secondary {
      background: #e5e7eb;
      color: #374151;
    }

    button.danger {
      background: #f3e3e3;
      color: #6b4d4d;
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .meta {
      font-size: 12px;
      color: #777;
      margin: 8px 0;
    }

    .text {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
    }

    .text.collapsed {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 5;
      overflow: hidden;
    }

    .highlight {
      background: #fff3a3;
      border-radius: 4px;
      padding: 0 1px;
    }

    .text-toggle {
      margin-top: 6px;
      text-align: right;
    }

    .text-toggle button,
    .utility-toggle button,
    .mode-link-button {
      padding: 0;
      font-size: 12px;
      background: transparent;
      color: #8a94a6;
      border: none;
      box-shadow: none;
      border-radius: 0;
    }

    .text-toggle button:hover,
    .utility-toggle button:hover,
    .mode-link-button:hover {
      color: #6b7280;
    }

    .panel-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
      margin-bottom: 18px;
    }

    .panel-header-row .meta {
      margin: 0;
    }

    .utility-toggle {
      margin-top: 0;
      text-align: right;
      flex-shrink: 0;
    }

    .utility-actions {
      margin-top: 18px;
    }

    .utility-actions .row + .row {
      margin-top: 16px;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      font-size: 12px;
      margin-right: 6px;
      margin-top: 8px;
    }

    .pinned {
      border: 2px solid #f59e0b;
    }

    .empty {
      text-align: center;
      color: #777;
      padding: 24px;
    }

    .card-edit-text {
      min-height: 160px;
      overflow-y: auto;
    }

    .card-edit-tags {
      margin-top: 10px;
    }

    .card-edit-actions {
      margin-top: 10px;
    }

    .tag-input-wrap {
      position: relative;
      flex: 1;
      min-width: 140px;
      z-index: 20;
    }

    .tag-input-wrap input {
      width: 100%;
    }

    .tag-suggestions {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      border: 1px solid #d0d0d7;
      border-radius: 12px;
      background: #fff;
      padding: 8px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 1000;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }

    .tag-suggestion-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 10px;
      margin: 0;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: #4b5563;
      font-size: 14px;
      cursor: pointer;
    }

    .tag-suggestion-item:hover {
      background: #f3f4f6;
    }

    .tag-suggestion-empty {
      padding: 8px 10px;
      font-size: 13px;
      color: #9ca3af;
    }

    .search-input-wrap {
      position: relative;
      flex: 1;
      min-width: 140px;
    }

    .input-text-wrap {
      position: relative;
    }

    .input-text-wrap textarea {
      width: 100%;
      padding-right: 42px;
    }

    .search-input-wrap input {
      width: 100%;
      padding-right: 42px;
    }

    .clear-search-btn,
    .clear-input-btn {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      padding: 0;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #9ca3af;
      font-size: 18px;
      line-height: 24px;
      text-align: center;
      box-shadow: none;
    }

    .clear-search-btn:hover,
    .clear-input-btn:hover {
      color: #6b7280;
      background: #f3f4f6;
    }

    .mode-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .mode-title {
      font-size: 18px;
      font-weight: 600;
      color: #1f2937;
    }

    .mode-note {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .sort-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sort-item {
      display: flex;
      align-items: stretch;
      gap: 12px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 10px 12px;
      transition: background .15s ease, border-color .15s ease, box-shadow .15s ease, transform .15s ease, opacity .15s ease;
    }

    .sort-item.dragging {
      border-color: #94a3b8;
      box-shadow: 0 12px 28px rgba(0,0,0,.14);
      background: #ffffff;
      transform: scale(1.01);
      opacity: 0.92;
    }

    .sort-item.drag-over {
      border-color: #cbd5e1;
      background: #f8fafc;
    }

    .sort-preview {
      flex: 1;
      min-width: 0;
      color: #1f2937;
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
      word-break: break-word;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .sort-handle-wrap {
      flex-shrink: 0;
      width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      border-radius: 12px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .sort-handle-wrap:active {
      cursor: grabbing;
    }

    .sort-handle {
      color: #9ca3af;
      font-size: 18px;
      line-height: 1;
      pointer-events: none;
    }

    .sort-empty,
    .bulk-empty {
      text-align: center;
      color: #777;
      padding: 24px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
    }

    .bulk-field {
      margin-bottom: 14px;
    }

    .bulk-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .bulk-note {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .bulk-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .bulk-actions > * {
      flex: 1;
      min-width: 140px;
    }

    .copy-toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 180px;
      max-width: calc(100vw - 48px);
      padding: 12px 20px;
      border-radius: 14px;
      background: rgba(107, 114, 128, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.28);
      color: #f3f4f6;
      font-size: clamp(16px, 3.1vw, 22px);
      font-weight: 560;
      letter-spacing: 0.01em;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 4000;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.14);
      backdrop-filter: blur(8px) saturate(120%);
      -webkit-backdrop-filter: blur(8px) saturate(120%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .copy-toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>剪貼簿 v3</h1>

    <div id="homeView">
      <div class="panel">
        <div class="input-text-wrap">
          <textarea id="inputText" placeholder="請貼上或輸入文字…"></textarea>
          <button id="clearInputBtn" type="button" class="clear-input-btn hidden" aria-label="清空輸入">×</button>
        </div>
        <div class="row">
          <div class="tag-input-wrap">
            <input id="inputTags" placeholder="分類標籤，多個標籤可用逗號、頓號或分號分隔，例如：工作，筆記、常用" />
            <div id="tagSuggestions" class="tag-suggestions hidden"></div>
          </div>
          <button id="addBtn">新增</button>
          <button id="pasteBtn" class="secondary">貼上剪貼簿</button>
        </div>
      </div>

      <div class="panel">
        <div class="row">
          <div class="search-input-wrap">
            <input id="searchInput" placeholder="搜尋內容…" />
            <button id="clearSearchBtn" type="button" class="clear-search-btn hidden" aria-label="清除搜尋">×</button>
          </div>
          <select id="filterTag">
            <option value="">全部分類</option>
          </select>
          <select id="filterPinned">
            <option value="">全部</option>
            <option value="pinned">只看置頂</option>
          </select>
        </div>

        <div class="panel-header-row">
          <div class="meta" id="infoBar">目前共有 0 筆資料</div>

          <div class="utility-toggle">
            <button id="toggleUtilityBtn">更多操作 ▾</button>
          </div>
        </div>

        <div id="utilityActions" class="utility-actions hidden">
          <div class="row">
            <button id="exportBtn" class="secondary">匯出 JSON</button>
            <input id="importFile" type="file" accept=".json" />
            <button id="clearAllBtn" class="danger">清空全部</button>
          </div>

          <div class="row">
            <button id="openSortBtn" class="secondary">排序</button>
            <button id="openBulkTagEditorBtn" class="secondary">編輯標籤</button>
            <button id="reservedBtn" class="secondary" disabled>保留</button>
          </div>
        </div>
      </div>

      <div id="list"></div>
    </div>

    <div id="sortView" class="hidden">
      <div class="panel">
        <div class="mode-header">
          <div class="mode-title">排序</div>
          <button id="finishSortBtn">完成排序</button>
        </div>
        <div class="mode-note">從右側把手拖拉，就可以改變位置。</div>
        <div id="sortList" class="sort-list"></div>
      </div>
    </div>

    <div id="bulkTagEditorView" class="hidden">
      <div class="panel">
        <div class="mode-header">
          <div class="mode-title">編輯標籤</div>
          <button id="backFromTagEditorBtn" class="secondary">回到主畫面</button>
        </div>
        <div id="bulkTagEditorContent"></div>
      </div>
    </div>
  </div>

  <div id="copyToast" class="copy-toast hidden" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "clipboard_items_v2";
    const UNTAGGED_VALUE = "__untagged__";
    const $ = id => document.getElementById(id);
    let copyToastFadeTimer = null;
    let copyToastHideTimer = null;

    function showCopyToast(message) {
      const toast = $("copyToast");
      if (!toast) return;

      toast.textContent = message;
      toast.classList.remove("hidden");
      requestAnimationFrame(() => {
        toast.classList.add("show");
      });

      if (copyToastFadeTimer) {
        clearTimeout(copyToastFadeTimer);
      }

      if (copyToastHideTimer) {
        clearTimeout(copyToastHideTimer);
      }

      copyToastFadeTimer = window.setTimeout(() => {
        toast.classList.remove("show");
        copyToastFadeTimer = null;
      }, 1000);

      copyToastHideTimer = window.setTimeout(() => {
        toast.classList.add("hidden");
        copyToastHideTimer = null;
      }, 2000);
    }

    function normalizeTags(tags) {
      if (!Array.isArray(tags)) return [];

      const flattened = tags.flatMap(tag => {
        if (tag === null || tag === undefined) return [];
        return String(tag)
          .split(/[,\uFF0C\u3001;\uFF1B]+/)
          .map(part => part.trim())
          .filter(Boolean);
      });

      return [...new Set(flattened)];
    }

    function parseTags(input) {
      if (!input) return [];
      return normalizeTags([input]);
    }

    function normalizeItem(item, index = 0) {
      const text = typeof item?.text === "string" ? item.text : "";

      let tags = [];
      if (Array.isArray(item?.tags)) {
        tags = normalizeTags(item.tags);
      } else if (typeof item?.tag === "string" && item.tag.trim()) {
        tags = parseTags(item.tag);
      }

      const createdAt =
        typeof item?.createdAt === "number" && Number.isFinite(item.createdAt)
          ? item.createdAt
          : Date.now() + index;

      const order =
        typeof item?.order === "number" && Number.isFinite(item.order)
          ? item.order
          : index;

      return {
        id: typeof item?.id === "string" && item.id ? item.id : crypto.randomUUID(),
        text,
        tags,
        pinned: Boolean(item?.pinned),
        createdAt,
        order
      };
    }

    function normalizeItems(data) {
      if (!Array.isArray(data)) return [];
      return data.map((item, index) => normalizeItem(item, index));
    }

    function loadItems() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = JSON.parse(raw || "[]");
        return normalizeItems(parsed);
      } catch {
        return [];
      }
    }

    let items = loadItems();
    let keyword = "";
    let selectedTag = "";
    let pinnedOnly = "";
    let editingId = null;
    let editingText = "";
    let editingTags = "";
    let expandedIds = new Set();
    let utilityExpanded = false;
    let currentView = "home";

    let tagSuggestionsVisible = false;
    let hideTagSuggestionsTimer = null;

    let editTagSuggestionsVisible = false;
    let hideEditTagSuggestionsTimer = null;

    let dragSourceId = null;
    let dragOverTargetId = null;

    let bulkEditSelectedTag = "";
    let bulkEditNewName = "";

    let inputTextBaseHeight = 96;
    let inputTextMaxHeight = inputTextBaseHeight * 2;

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      render();
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }

    function escapeRegExp(text) {
      return String(text).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlightText(text, searchWord) {
      const source = String(text ?? "");
      const q = String(searchWord ?? "").trim();
      if (!q) return escapeHtml(source);

      const pattern = new RegExp(`(${escapeRegExp(q)})`, "gi");
      const parts = source.split(pattern);

      return parts.map(part => {
        if (!part) return "";
        if (part.toLowerCase() === q.toLowerCase()) {
          return `<span class="highlight">${escapeHtml(part)}</span>`;
        }
        return escapeHtml(part);
      }).join("");
    }

    function formatDate(ts) {
      return new Date(ts).toLocaleString("zh-TW");
    }

    function formatExportDate(date = new Date()) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function getTags() {
      const counter = new Map();

      for (const item of items) {
        const tags = Array.isArray(item.tags) ? item.tags : [];
        for (const tag of tags) {
          counter.set(tag, (counter.get(tag) || 0) + 1);
        }
      }

      return Array.from(counter.entries())
        .map(([name, count]) => ({ name, count }))
        .sort((a, b) => {
          if (b.count !== a.count) return b.count - a.count;
          return a.name.localeCompare(b.name, "zh-Hant");
        });
    }

    function getUntaggedCount() {
      return items.filter(item => !item.tags || item.tags.length === 0).length;
    }

    function refreshTagOptions() {
      const tagList = getTags();
      const untaggedCount = getUntaggedCount();

      let html = `<option value="">全部分類</option>`;

      if (untaggedCount > 0) {
        html += `<option value="${UNTAGGED_VALUE}">未分類（${untaggedCount}）</option>`;
      }

      html += tagList
        .map(tag => `<option value="${escapeHtml(tag.name)}">${escapeHtml(tag.name)}（${tag.count}）</option>`)
        .join("");

      $("filterTag").innerHTML = html;
      $("filterTag").value = selectedTag;
    }

    function getHomeOrderedItems() {
      return items.slice().sort((a, b) => {
        if (b.pinned !== a.pinned) return Number(b.pinned) - Number(a.pinned);
        if (a.order !== b.order) return b.order - a.order;
        return b.createdAt - a.createdAt;
      });
    }

    function filteredItems() {
      return getHomeOrderedItems()
        .filter(i => {
          if (!keyword) return true;
          const lowerKeyword = keyword.toLowerCase();
          const textMatch = i.text.toLowerCase().includes(lowerKeyword);
          const tagMatch = (i.tags || []).some(tag => tag.toLowerCase().includes(lowerKeyword));
          return textMatch || tagMatch;
        })
        .filter(i => {
          if (!selectedTag) return true;
          if (selectedTag === UNTAGGED_VALUE) {
            return !i.tags || i.tags.length === 0;
          }
          return (i.tags || []).includes(selectedTag);
        })
        .filter(i => pinnedOnly !== "pinned" || i.pinned);
    }

    function renderTags(tags) {
      if (!tags || !tags.length) return "";
      return tags.map(tag => `<div class="tag">${highlightText(tag, keyword)}</div>`).join("");
    }

    function shouldShowToggle(text) {
      const lines = String(text).split(/\r?\n/).length;
      return lines > 5 || String(text).length > 180;
    }

    function getSortPreviewText(text) {
      const lines = String(text)
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean);

      if (!lines.length) return "（空白內容）";
      return lines.slice(0, 2).join("\n");
    }

    function renderViewCard(item) {
      const isExpanded = expandedIds.has(item.id);
      const showToggle = shouldShowToggle(item.text);

      return `
        <div class="card ${item.pinned ? "pinned" : ""}">
          <div class="text ${showToggle && !isExpanded ? "collapsed" : ""}">${highlightText(item.text, keyword)}</div>
          ${
            showToggle
              ? `<div class="text-toggle">
                  <button onclick="toggleExpand('${item.id}')">
                    ${isExpanded ? "收起來 ▴" : "詳細內容 ▾"}
                  </button>
                </div>`
              : ""
          }
          ${renderTags(item.tags)}
          <div class="meta">建立時間：${formatDate(item.createdAt)}｜排序：${item.order}</div>
          <div class="row">
            <button onclick="copyItem('${item.id}')">複製</button>
            <button class="secondary" onclick="togglePin('${item.id}')">${item.pinned ? "取消置頂" : "置頂"}</button>
            <button class="secondary" onclick="editItem('${item.id}')">編輯</button>
            <button class="danger" onclick="deleteItem('${item.id}')">刪除</button>
          </div>
        </div>
      `;
    }

    function renderEditCard(item) {
      return `
        <div class="card ${item.pinned ? "pinned" : ""}">
          <textarea
            class="card-edit-text"
            placeholder="編輯內容…"
            oninput="updateEditingText(this.value)"
          >${escapeHtml(editingText)}</textarea>

          <div class="card-edit-tags">
            <div class="tag-input-wrap">
              <input
                id="editTagsInput"
                type="text"
                value="${escapeHtml(editingTags)}"
                placeholder="編輯分類標籤，多個標籤可用逗號、頓號或分號分隔"
                oninput="updateEditingTags(this.value)"
                onfocus="showEditTagSuggestions()"
                onblur="scheduleHideEditTagSuggestions()"
              />
              <div id="editTagSuggestions" class="tag-suggestions hidden"></div>
            </div>
          </div>

          <div class="meta">建立時間：${formatDate(item.createdAt)}｜排序：${item.order}</div>

          <div class="row card-edit-actions">
            <button onclick="saveEdit()">儲存修改</button>
            <button class="secondary" onclick="cancelEdit()">取消</button>
          </div>
        </div>
      `;
    }

    function renderSortList() {
      const container = $("sortList");
      if (!container) return;

      const data = getHomeOrderedItems();

      if (!data.length) {
        container.innerHTML = `<div class="sort-empty">目前沒有可排序的資料</div>`;
        return;
      }

      container.innerHTML = data.map(item => `
        <div class="sort-item ${item.id === dragSourceId ? "dragging" : ""} ${item.id === dragOverTargetId ? "drag-over" : ""}" data-id="${item.id}" ondragover="handleSortDragOver(event)" ondrop="handleSortDrop(event)" ondragleave="handleSortDragLeave(event)">
          <div class="sort-preview">${escapeHtml(getSortPreviewText(item.text))}</div>
          <div
            class="sort-handle-wrap"
            draggable="true"
            data-id="${item.id}"
            ondragstart="handleSortDragStart(event)"
            ondragend="handleSortDragEnd(event)"
            title="拖拉排序"
          >
            <div class="sort-handle">⋮⋮</div>
          </div>
        </div>
      `).join("");
    }

    function renderBulkTagEditor() {
      const container = $("bulkTagEditorContent");
      if (!container) return;

      const tags = getTags();

      if (!tags.length) {
        container.innerHTML = `<div class="bulk-empty">目前還沒有可編輯的標籤</div>`;
        return;
      }

      if (!bulkEditSelectedTag || !tags.some(tag => tag.name === bulkEditSelectedTag)) {
        bulkEditSelectedTag = tags[0].name;
      }

      if (bulkEditNewName === "") {
        bulkEditNewName = bulkEditSelectedTag;
      }

      const targetCount = items.filter(item => (item.tags || []).includes(bulkEditSelectedTag)).length;

      container.innerHTML = `
        <div class="bulk-field">
          <div class="bulk-label">要編輯的標籤</div>
          <select id="bulkTagSelect">
            ${tags.map(tag => `
              <option value="${escapeHtml(tag.name)}" ${tag.name === bulkEditSelectedTag ? "selected" : ""}>
                ${escapeHtml(tag.name)}（${tag.count}）
              </option>
            `).join("")}
          </select>
        </div>

        <div class="bulk-field">
          <div class="bulk-label">新的標籤名稱</div>
          <input id="bulkTagRenameInput" value="${escapeHtml(bulkEditNewName)}" />
        </div>

        <div class="bulk-note">
          目前共有 ${targetCount} 筆資料使用這個標籤。按下確認後，會把這個舊標籤整個改成新的名稱。
        </div>

        <div class="bulk-actions">
          <button id="confirmBulkTagRenameBtn">確認修改</button>
        </div>
      `;

      $("bulkTagSelect").addEventListener("change", e => {
        bulkEditSelectedTag = e.target.value;
        bulkEditNewName = e.target.value;
        renderBulkTagEditor();
      });

      $("bulkTagRenameInput").addEventListener("input", e => {
        bulkEditNewName = e.target.value;
      });

      $("confirmBulkTagRenameBtn").addEventListener("click", confirmBulkTagRename);
    }

    function updateViewVisibility() {
      $("homeView").classList.toggle("hidden", currentView !== "home");
      $("sortView").classList.toggle("hidden", currentView !== "sort");
      $("bulkTagEditorView").classList.toggle("hidden", currentView !== "bulkTagEditor");
    }

    function renderHomeList() {
      const data = filteredItems();
      $("infoBar").textContent = `目前共有 ${items.length} 筆資料，顯示 ${data.length} 筆`;

      if (!data.length) {
        $("list").innerHTML = `<div class="card empty">目前沒有符合條件的內容</div>`;
        return;
      }

      $("list").innerHTML = data.map(item => {
        if (item.id === editingId) {
          return renderEditCard(item);
        }
        return renderViewCard(item);
      }).join("");

      if (editingId) {
        requestAnimationFrame(() => {
          adjustEditTextareaHeight();
          if (editTagSuggestionsVisible) {
            renderEditTagSuggestions();
          }
        });
      }
    }

    function render() {
      updateViewVisibility();
      refreshTagOptions();
      updateClearSearchButton();
      updateClearInputButton();
      updateUtilityToggle();

      if (tagSuggestionsVisible) {
        renderTagSuggestions();
      }

      renderHomeList();
      renderSortList();
      renderBulkTagEditor();
    }

    function getNextOrder() {
      if (!items.length) return 0;
      return Math.max(...items.map(item => Number.isFinite(item.order) ? item.order : 0)) + 1;
    }

    function addItem() {
      const text = $("inputText").value.trim();
      const tagsInput = $("inputTags").value.trim();
      const tags = parseTags(tagsInput);

      if (!text) {
        alert("請先輸入內容");
        return;
      }

      items.push(normalizeItem({
        id: crypto.randomUUID(),
        text,
        tags,
        pinned: false,
        createdAt: Date.now(),
        order: getNextOrder()
      }));

      $("inputText").value = "";
      $("inputTags").value = "";
      adjustInputTextareaHeight();
      hideTagSuggestions();
      save();
    }

    async function pasteFromClipboard() {
      try {
        $("inputText").value = await navigator.clipboard.readText();
        adjustInputTextareaHeight();
        updateClearInputButton();
      } catch {
        alert("無法直接讀取剪貼簿，可能是權限限制。");
      }
    }

    function adjustInputTextareaHeight() {
      const textarea = $("inputText");
      if (!textarea) return;

      textarea.style.height = `${inputTextBaseHeight}px`;
      const nextHeight = Math.min(
        Math.max(textarea.scrollHeight, inputTextBaseHeight),
        inputTextMaxHeight
      );
      textarea.style.height = `${nextHeight}px`;
      textarea.style.overflowY = nextHeight >= inputTextMaxHeight ? "auto" : "hidden";
    }

    function initInputTextareaAutoHeight() {
      const textarea = $("inputText");
      if (!textarea) return;

      const computed = window.getComputedStyle(textarea);
      const parsedMinHeight = parseFloat(computed.minHeight);
      const parsedHeight = parseFloat(computed.height);
      const baseline = Number.isFinite(parsedMinHeight) && parsedMinHeight > 0
        ? parsedMinHeight
        : Number.isFinite(parsedHeight) && parsedHeight > 0
          ? parsedHeight
          : 96;

      inputTextBaseHeight = baseline;
      inputTextMaxHeight = baseline * 2;
      adjustInputTextareaHeight();
    }

    function adjustEditTextareaHeight() {
      const textarea = document.querySelector(".card-edit-text");
      if (!textarea) return;

      const computed = window.getComputedStyle(textarea);
      const lineHeight = parseFloat(computed.lineHeight) || 26;
      const lines = textarea.value.split(/\r?\n/).length;
      const targetLines = Math.min(Math.max(lines, 6), 15);

      textarea.style.height = `${targetLines * lineHeight}px`;
    }

    function startEdit(item) {
      editingId = item.id;
      editingText = item.text;
      editingTags = (item.tags || []).join("，");
      editTagSuggestionsVisible = false;
      render();
      requestAnimationFrame(adjustEditTextareaHeight);
    }

    function resetEditState() {
      editingId = null;
      editingText = "";
      editingTags = "";
      editTagSuggestionsVisible = false;
      if (hideEditTagSuggestionsTimer) {
        clearTimeout(hideEditTagSuggestionsTimer);
        hideEditTagSuggestionsTimer = null;
      }
    }

    function saveEdit() {
      if (!editingId) return;

      const item = items.find(i => i.id === editingId);
      if (!item) {
        resetEditState();
        render();
        return;
      }

      if (!editingText.trim()) {
        alert("內容不可為空");
        return;
      }

      item.text = editingText;
      item.tags = parseTags(editingTags);

      resetEditState();
      save();
    }

    function cancelEdit() {
      resetEditState();
      render();
    }

    function openSortMode() {
      hideTagSuggestions();
      resetEditState();
      currentView = "sort";
      render();
    }

    function finishSortMode() {
      currentView = "home";
      dragSourceId = null;
      dragOverTargetId = null;
      render();
    }

    function openBulkTagEditor() {
      hideTagSuggestions();
      resetEditState();
      const tags = getTags();
      bulkEditSelectedTag = tags[0] ? tags[0].name : "";
      bulkEditNewName = bulkEditSelectedTag;
      currentView = "bulkTagEditor";
      render();
    }

    function backToHomeFromTagEditor() {
      currentView = "home";
      render();
    }

    function confirmBulkTagRename() {
      const oldTag = bulkEditSelectedTag;
      const newTag = bulkEditNewName.trim();

      if (!oldTag) {
        alert("請先選擇要編輯的標籤");
        return;
      }

      if (!newTag) {
        alert("新的標籤名稱不可為空");
        return;
      }

      if (oldTag === newTag) {
        alert("標籤名稱沒有變更");
        return;
      }

      const affectedCount = items.filter(item => (item.tags || []).includes(oldTag)).length;
      if (!affectedCount) {
        alert("目前沒有資料使用這個標籤");
        return;
      }

      const confirmed = confirm(`將把 ${affectedCount} 筆資料中的標籤「${oldTag}」改成「${newTag}」，是否確認？`);
      if (!confirmed) return;

      items = items.map(item => {
        const originalTags = Array.isArray(item.tags) ? item.tags : [];
        const replacedTags = originalTags.map(tag => tag === oldTag ? newTag : tag);
        return {
          ...item,
          tags: normalizeTags(replacedTags)
        };
      });

      bulkEditSelectedTag = newTag;
      bulkEditNewName = newTag;
      save();
      currentView = "bulkTagEditor";
      alert("標籤已更新");
    }

    function updateUtilityToggle() {
      const actions = $("utilityActions");
      const button = $("toggleUtilityBtn");
      if (!actions || !button) return;

      actions.classList.toggle("hidden", !utilityExpanded);
      button.textContent = utilityExpanded ? "收起來 ▴" : "更多操作 ▾";
    }

    function renderTagSuggestions() {
      const container = $("tagSuggestions");
      if (!container) return;

      const tags = getTags();
      if (!tags.length) {
        container.innerHTML = `<div class="tag-suggestion-empty">目前還沒有可選標籤</div>`;
        container.classList.remove("hidden");
        return;
      }

      container.innerHTML = tags.map(tag => `
        <button
          type="button"
          class="tag-suggestion-item"
          data-tag="${escapeHtml(tag.name)}"
        >${escapeHtml(tag.name)}（${tag.count}）</button>
      `).join("");

      container.classList.remove("hidden");
    }

    function showTagSuggestions() {
      tagSuggestionsVisible = true;
      if (hideTagSuggestionsTimer) {
        clearTimeout(hideTagSuggestionsTimer);
        hideTagSuggestionsTimer = null;
      }
      renderTagSuggestions();
    }

    function hideTagSuggestions() {
      tagSuggestionsVisible = false;
      const container = $("tagSuggestions");
      if (!container) return;
      container.classList.add("hidden");
    }

    function insertTagToInput(tagName) {
      const input = $("inputTags");
      if (!input) return;

      const existingTags = parseTags(input.value);
      if (existingTags.includes(tagName)) {
        input.focus();
        return;
      }

      const nextTags = [...existingTags, tagName];
      input.value = nextTags.join("，");
      input.focus();
      showTagSuggestions();
    }

    function renderEditTagSuggestions() {
      const container = $("editTagSuggestions");
      if (!container) return;

      const tags = getTags();
      if (!tags.length) {
        container.innerHTML = `<div class="tag-suggestion-empty">目前還沒有可選標籤</div>`;
        container.classList.remove("hidden");
        return;
      }

      container.innerHTML = tags.map(tag => `
        <button
          type="button"
          class="tag-suggestion-item"
          data-tag="${escapeHtml(tag.name)}"
        >${escapeHtml(tag.name)}（${tag.count}）</button>
      `).join("");

      container.classList.remove("hidden");
    }

    function showEditTagSuggestions() {
      editTagSuggestionsVisible = true;
      if (hideEditTagSuggestionsTimer) {
        clearTimeout(hideEditTagSuggestionsTimer);
        hideEditTagSuggestionsTimer = null;
      }
      renderEditTagSuggestions();
    }

    function hideEditTagSuggestions() {
      editTagSuggestionsVisible = false;
      const container = $("editTagSuggestions");
      if (!container) return;
      container.classList.add("hidden");
    }

    function scheduleHideEditTagSuggestions() {
      hideEditTagSuggestionsTimer = setTimeout(() => {
        hideEditTagSuggestions();
      }, 120);
    }

    function insertTagToEditInput(tagName) {
      const existingTags = parseTags(editingTags);
      if (existingTags.includes(tagName)) {
        const input = $("editTagsInput");
        if (input) input.focus();
        return;
      }

      const nextTags = [...existingTags, tagName];
      editingTags = nextTags.join("，");
      render();

      requestAnimationFrame(() => {
        const input = $("editTagsInput");
        if (input) input.focus();
        showEditTagSuggestions();
      });
    }

    function updateClearSearchButton() {
      const btn = $("clearSearchBtn");
      const input = $("searchInput");
      if (!btn || !input) return;

      btn.classList.toggle("hidden", !input.value);
    }

    function updateClearInputButton() {
      const btn = $("clearInputBtn");
      const input = $("inputText");
      if (!btn || !input) return;

      btn.classList.toggle("hidden", !input.value);
    }

    function applyDisplayOrder(displayIds) {
      const base = displayIds.length;
      const orderMap = new Map(displayIds.map((id, index) => [id, base - index]));

      items = items.map(item => ({
        ...item,
        order: orderMap.has(item.id) ? orderMap.get(item.id) : item.order
      }));
    }

    function moveItemInDisplayedOrder(sourceId, targetId, insertAfter) {
      const orderedIds = getHomeOrderedItems().map(item => item.id);
      const fromIndex = orderedIds.indexOf(sourceId);
      const targetIndex = orderedIds.indexOf(targetId);

      if (fromIndex < 0 || targetIndex < 0) return;

      orderedIds.splice(fromIndex, 1);
      const adjustedTargetIndex = orderedIds.indexOf(targetId);
      const insertIndex = insertAfter ? adjustedTargetIndex + 1 : adjustedTargetIndex;
      orderedIds.splice(insertIndex, 0, sourceId);

      applyDisplayOrder(orderedIds);
    }

    window.handleSortDragStart = event => {
      const sourceId = event.currentTarget.dataset.id;
      if (!sourceId) return;

      dragSourceId = sourceId;
      dragOverTargetId = null;

      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", sourceId);

      const draggedItem = event.currentTarget.closest(".sort-item");
      if (draggedItem) {
        draggedItem.classList.add("dragging");
      }
    };

    window.handleSortDragOver = event => {
      event.preventDefault();

      const targetItem = event.currentTarget;
      const targetId = targetItem?.dataset.id;
      if (!targetId || !dragSourceId || targetId === dragSourceId) return;

      const rect = targetItem.getBoundingClientRect();
      const insertAfter = event.clientY > rect.top + rect.height / 2;

      dragOverTargetId = targetId;
      moveItemInDisplayedOrder(dragSourceId, targetId, insertAfter);
      render();
      currentView = "sort";
    };

    window.handleSortDragLeave = event => {
      const targetItem = event.currentTarget;
      if (!targetItem) return;
      targetItem.classList.remove("drag-over");
    };

    window.handleSortDrop = event => {
      event.preventDefault();
      dragOverTargetId = null;
      save();
      currentView = "sort";
    };

    window.handleSortDragEnd = () => {
      dragSourceId = null;
      dragOverTargetId = null;
      render();
      currentView = "sort";
    };

    window.updateEditingText = value => {
      editingText = value;
      adjustEditTextareaHeight();
    };

    window.updateEditingTags = value => {
      editingTags = value;
      if (editTagSuggestionsVisible) {
        renderEditTagSuggestions();
      }
    };

    window.showEditTagSuggestions = showEditTagSuggestions;
    window.scheduleHideEditTagSuggestions = scheduleHideEditTagSuggestions;

    window.toggleExpand = id => {
      if (expandedIds.has(id)) {
        expandedIds.delete(id);
      } else {
        expandedIds.add(id);
      }
      render();
    };

    window.copyItem = async id => {
      const item = items.find(i => i.id === id);
      if (!item) return;

      try {
        await navigator.clipboard.writeText(item.text);
        showCopyToast("已複製");
      } catch {
        showCopyToast("複製失敗");
      }
    };

    window.togglePin = id => {
      const item = items.find(i => i.id === id);
      if (!item) return;
      item.pinned = !item.pinned;
      save();
    };

    window.editItem = id => {
      const item = items.find(i => i.id === id);
      if (!item) return;
      startEdit(item);
    };

    window.saveEdit = saveEdit;
    window.cancelEdit = cancelEdit;

    window.deleteItem = id => {
      if (!confirm("確定要刪除這筆資料嗎？")) return;
      items = items.filter(i => i.id !== id);
      expandedIds.delete(id);

      if (editingId === id) {
        resetEditState();
      }

      save();
    };

    function exportJSON() {
      const blob = new Blob([JSON.stringify(items, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `剪貼簿資料_${formatExportDate()}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function importJSON(file) {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data)) throw new Error();
          items = normalizeItems(data);
          expandedIds = new Set();
          resetEditState();
          hideTagSuggestions();
          save();
          alert("匯入成功");
        } catch {
          alert("匯入失敗，JSON 格式不正確");
        }
      };
      reader.readAsText(file);
    }

    function clearAll() {
      if (!items.length) return;
      if (!confirm("確定要清空全部資料嗎？")) return;
      items = [];
      expandedIds = new Set();
      resetEditState();
      save();
    }

    $("addBtn").addEventListener("click", addItem);
    $("pasteBtn").addEventListener("click", pasteFromClipboard);

    $("inputText").addEventListener("input", adjustInputTextareaHeight);
    $("inputText").addEventListener("input", updateClearInputButton);
    $("inputText").addEventListener("paste", () => {
      requestAnimationFrame(() => {
        adjustInputTextareaHeight();
        updateClearInputButton();
      });
    });

    $("clearInputBtn").addEventListener("click", () => {
      $("inputText").value = "";
      adjustInputTextareaHeight();
      updateClearInputButton();
      $("inputText").focus();
    });

    $("searchInput").addEventListener("input", e => {
      keyword = e.target.value;
      render();
    });

    $("clearSearchBtn").addEventListener("click", () => {
      $("searchInput").value = "";
      keyword = "";
      render();
      $("searchInput").focus();
    });

    $("filterTag").addEventListener("change", e => {
      selectedTag = e.target.value;
      render();
    });

    $("filterPinned").addEventListener("change", e => {
      pinnedOnly = e.target.value;
      render();
    });

    $("toggleUtilityBtn").addEventListener("click", () => {
      utilityExpanded = !utilityExpanded;
      updateUtilityToggle();
    });

    $("exportBtn").addEventListener("click", exportJSON);

    $("importFile").addEventListener("change", e => {
      if (e.target.files[0]) importJSON(e.target.files[0]);
    });

    $("clearAllBtn").addEventListener("click", clearAll);

    $("openSortBtn").addEventListener("click", openSortMode);
    $("finishSortBtn").addEventListener("click", finishSortMode);

    $("openBulkTagEditorBtn").addEventListener("click", openBulkTagEditor);
    $("backFromTagEditorBtn").addEventListener("click", backToHomeFromTagEditor);

    $("inputTags").addEventListener("focus", () => {
      showTagSuggestions();
    });

    $("inputTags").addEventListener("input", () => {
      if (tagSuggestionsVisible) {
        renderTagSuggestions();
      }
    });

    $("inputTags").addEventListener("blur", () => {
      hideTagSuggestionsTimer = setTimeout(() => {
        hideTagSuggestions();
      }, 120);
    });

    $("tagSuggestions").addEventListener("mousedown", e => {
      const button = e.target.closest(".tag-suggestion-item");
      if (!button) return;
      e.preventDefault();
      const tagName = button.dataset.tag;
      if (!tagName) return;
      insertTagToInput(tagName);
    });

    document.addEventListener("mousedown", e => {
      const editSuggestions = $("editTagSuggestions");
      const editInput = $("editTagsInput");

      if (!editSuggestions || !editInput) return;

      const clickedSuggestion = e.target.closest(".tag-suggestion-item");
      const insideEditSuggestions = editSuggestions.contains(e.target);
      const insideEditInput = editInput.contains(e.target);

      if (insideEditSuggestions && clickedSuggestion) {
        e.preventDefault();
        const tagName = clickedSuggestion.dataset.tag;
        if (tagName) insertTagToEditInput(tagName);
        return;
      }

      if (!insideEditSuggestions && !insideEditInput) {
        hideEditTagSuggestions();
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        setTimeout(() => {
          $("filterTag")?.blur();
        }, 50);
      }
    });

    window.addEventListener("pageshow", () => {
      setTimeout(() => {
        $("filterTag")?.blur();
      }, 50);
    });

    window.addEventListener("focus", () => {
      setTimeout(() => {
        $("filterTag")?.blur();
      }, 50);
    });

    initInputTextareaAutoHeight();
    render();
  </script>
</body>
</html>
